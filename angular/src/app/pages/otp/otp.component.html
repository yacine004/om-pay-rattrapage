<div class="om-phone-frame om-center">
  <div class="om-title om-title--top-large"><span class="om-accent">Orange</span> Money</div>
  <div class="om-title om-title--top-small"><span class="om-accent">Transférer</span> de l'argent</div>

  <div class="om-card om-card--otp">
    <p class="om-card__text">SMS d'authentification vérifié ! Veuillez saisir le code reçu par SMS.</p>

    <input
      class="om-input om-input--otp"
      type="text"
      placeholder="Code reçu par SMS"
      [(ngModel)]="code"
      maxlength="4"
    />

    @if (error()) {
      <p class="om-error">{{ error() }}</p>
    }

    <button class="om-button" (click)="onSubmit()">Valider</button>
  </div>
</div>
