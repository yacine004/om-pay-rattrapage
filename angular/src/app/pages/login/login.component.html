<div class="om-phone-frame">
  <div class="om-title__wrapper">
    <div class="om-title"><span class="om-accent">Orange</span> Money</div>
  </div>

  <div class="login-flex">
    <div>
      <div class="om-title"><span class="om-accent">Transférer</span> de l'argent</div>
      <p class="om-subtitle">
        Envoyez rapidement et en toute sécurité de l'argent à un proche qui possède un compte Orange Money.
      </p>
    </div>

    <div class="om-card">
      <h3 class="om-heading-reset">Bienvenue sur OM Pay !</h3>
      <p class="om-subtitle om-subtitle--with-bottom">Entrez votre numéro mobile pour vous connecter</p>

      <div class="om-input-row">
        <select id="country-code" aria-label="Indicatif du pays" class="om-input om-input--code">
          <option>+221</option>
        </select>
        <input
          class="om-input"
          type="tel"
          placeholder="Saisir mon numéro"
          [(ngModel)]="phoneNumber"
          maxlength="9"
        />
      </div>

      @if (error()) {
        <p class="om-error">{{ error() }}</p>
      }

      <button class="om-button" (click)="onSubmit()">Se connecter</button>
    </div>
  </div>
</div>
