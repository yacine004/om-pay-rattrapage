<div class="om-phone-frame om-center">
  <div class="om-title om-title--top-large"><span class="om-accent">Orange</span> Money</div>
  <div class="om-title om-title--top-small"><span class="om-accent">Transférer</span> de l'argent</div>

  <div class="om-card om-card--pin">
    <p class="om-card__text">
      SMS d'authentification vérifié ! Veuillez saisir votre code secret Orange Money.
    </p>

    <div class="pin-indicators">
      @for (d of digits(); track $index) {
        <div class="pin-dot" [class.filled]="d"></div>
      }
    </div>

    @if (error()) {
      <p class="om-error">{{ error() }}</p>
    }

    <div class="pin-keypad">
      @for (key of keypad; track key) {
        <button class="om-button om-button--keypad" (click)="pressDigit(key)">{{ key }}</button>
      }
      <div class="pin-keypad-spacer"></div>
      <button class="om-button om-button--keypad om-button--outline" (click)="backspace()">⌫</button>
    </div>
  </div>
</div>
